simulation:
  export_dir: "exports"  # Base directory for all exports
  window:
    width: 1728
    height: 1117
  ui:
    enabled: true
    ui_bar_height: 60
    buttons:
      width: 120
      height: 40
      gap: 10
    worm_history_panel:
      enabled: false
      display_area:
        x: 10
        y: 70
        width: 300
        height: 700
      chunk_preview_size: 36
      text_height: 18
      spacing: 6
      show_hsv_text: false
      show_contrast_markers: true  # Show wild/stretch/min/max borders and % on swatches
  fps: 60
  torus_world: false
  physics:
    gravity:
      x: 0
      y: 0
    chunk:
      elasticity: 1.0
      friction: 5.0
      mass: 1.0
      shape_filter_group: 1
      explosion:
        speed_min: 5
        speed_max: 70

queue:
  background_workers: 4    # Number of parallel background processes
  max_http_upload_drain: 4      # Max http uploads to process per frame
  max_chunk_drain: 15      # Max chunks to integrate per frame

colors:
  BLACK: [0, 0, 0]
  WHITE: [255, 255, 255]
  DARK_GRAY: [70, 70, 70]
  UI_BG: [30, 30, 30]
  RED: [255, 0, 0]
  PANEL_BG: [40, 40, 40]
  RECORDING: [200, 60, 60]  # Red background for recording buttons

server:
  host: 127.0.0.1
  port: 5055
  max_download_bytes: 26214400 # 25MB
  download_timeout_sec: 15
  
worm:
  max_meals: 15             # Hard ceiling on meals per worm
  max_meal_pct: 0.02        # Worm can eat at most this fraction of available chunks
  min_meals: 5              # Floor — worm always gets at least this many meals
  appetite:
    method: cone  # "cone" (no weights) or "weighted" (uses hue/sat/val weights)
    initial_min: 0.25  # First worm appetite for contrast floor
    initial_max: 0.75  # First worm appetite for contrast ceiling
    jitter_wide: 0.001   # Jitter chance when band is full (max-min=100%)
    jitter_narrow: 0.1 # Jitter chance when band is collapsed (max-min=0%)
    jitter_curve: 6     # Exponent: 1=linear, higher=stays low longer, ramps sharply near 0
    # Only used when method: weighted
    # hue_weight: 0.6
    # saturation_weight: 0.2
    # value_weight: 0.2
  consumption_particles:
    enabled: true
    min_count: 1         # Particles for smallest chunks
    max_count: 100        # Particles for largest chunks
    max_size: 500        # Chunk dimension (pixels) that gets max_count
    speed: 1.0           # Max random drift speed (pixels/frame)
    lifetime_frames: 100 # Max frames a particle lives
    radius: 1            # Base particle dot radius (pixels)
    radius_jitter: 2     # Random ±variation in pixels (0 = uniform size)
    drag: 0.97           # Drift damping per frame (1.0 = no drag, 0.5 = near instant stop)
  # --- SUPERABUNDANCE: When there are more than threshold particles ---
  # During superabundance, multiple worms are spawned to handle the increased load
  superabundance:
    threshold: 700  # Number of particles that triggers superabundance
    worms_per_upload: 2  # Number of worms spawned per upload during superabundance
    auto_export_capped_after_ms: 30000  # Auto-export glues capped longer than this during superabundance
  glue:
    enabled: true
    max_glued_chunks: 100
    max_active_glues: 5
    sound_cap: 10  # Maximum sound chunks per glue (null for no limit)
    color_attraction:
      min_difference: 0
      max_difference: 0.07
    flocking:
      maxspeed: 75
      maxforce: 10
      desired_separation: 30
      separate_force_mult: 40
      seek_force_mult: 35
    visual:
      enabled: true
      glow_radius: 20
      pulse_speed: 0.05
      pulse_min: 0.7
      pulse_max: 1.0
      glow_alpha_max: 150  # Maximum alpha for glow effect
      full_ring_width: 2   # Width of white ring when glue is full
      spin_speed: 1.0      # Rotation speed of color wheel
      min_quality_steps: 6 # Minimum steps per segment for color wheel quality

image:
  segmentation:
    # --- Felzenszwalb Segmentation ---
    # Hyperparameters to adjust:
    # scale (int, default: 100), sigma (float, default: 0.8), min_size (int, default: 20)
    # Increase scale -> fewer segments; Decrease scale -> more segments
    # Increase sigma -> smoother image, fewer segments; Decrease sigma -> sharper details
    # Increase min_size -> larger minimum segments; Decrease min_size -> smaller segments
    felzenszwalb:
      scale: 150
      sigma: 3
      min_size: 20
    # Minimal visibility filtering for image segments (post-segmentation)
    chunk_filter:
      min_visible_pixels: 30         # Skip segments with fewer visible pixels than this
      min_alpha_threshold: 8         # Alpha threshold (0-255) to consider a pixel visible
  compression:
    max_size: 10000
    min_entropy: 10
    downsample_factor: 0.3
    shrink_duration_seconds: 5.0

# --- Sound processing (for sound_chunking integration) ---
sound:
  chunks_dir: "sound_chunks"  # Directory for processed sound chunks
  max_part_duration: 60  # Split large audio files into parts (seconds). Set to 0 to disable.
  segmentation:
    felzenszwalb:
      scale: 150
      sigma: 1
      min_size: 20
    mel_spectrogram:
      enabled: true       # Use mel spectrogram (perceptual) vs STFT (linear)
      n_bins: 256         # Number of mel frequency bins
    chunk_filter:
      min_area_pixels: 300
      min_time_seconds: 0.5
      min_energy_ratio: 0.001
      min_loudness_db: -70.0
      max_shapes: 200
    file_fade_ms: 100  # Fade baked into WAV files (for loop boundaries)
  chunk_rendering:
    line_width: 2
    padding: 4
    points_per_second: 100
    resampled_points_per_chunk: 128
    min_width: 50
    min_height: 50
    max_width: 800
    max_height: 800
    sound_color:
      saturation_flatness:
        flatness_floor: 1e-9  # Log scale reference (smaller = wider range)
      value:
        min_value: 0.0  # Minimum V output (floor)
        fmin: 27.5      # Lowest frequency Hz (piano A0)
        fmax: 4186.0    # Highest frequency Hz (piano C8)
      alpha:
        min_alpha: 0.1  # Minimum alpha output (floor)
        min_db: -70.0   # dB that maps to min_alpha
        max_db: -14.0   # dB that maps to 1.0
      hue_saturation_atonal:
        temperature_scale: 0.0004  # Softmax temperature = scale / (spread + epsilon)
        temperature_min: 0.01      # Clamp temperature low
        temperature_max: 0.5       # Clamp temperature high
  hover:   # Proximity-based hover with inverse square law
    loops: -1         # Looping behavior (-1 = infinite)
    volume_smoother:
      enabled: true
      attack: 0.2   # [0-1] (lower = slower attack)
      release: 0.2  # [0-1] (lower = slower release)
    volume_scaling:
      max_distance: 300.0        # Maximum distance for audio (beyond this, volume = 0)
      reference_distance: 50.0   # Distance at which volume = 1.0 (for normalization)
      min_volume_threshold: 0.01 # Minimum volume to keep chunk playing
      perceptual_exponent: 0.7    # Volume perception curve
      line_width_multiplier: 20.0  # How much louder chunks get thicker
      alpha_boost: 0.5            # How much louder chunks get brighter
    mixer:
      # device: 4
      frequency: 48000
      size: 32
      channels: 2
      buffer: 512
  recording:
    input:
      device: 2 # Device name or index (run: uv run python -m sounddevice)
      sample_rate: 48000  # Match pygame mixer frequency
      channels: 1  # Mono/Stereo recording
      input_dir: "input_recordings"  # Where audio input recordings are saved before processing
    output:
      sample_rate: 48000  # Output sample rate
    glue:
      sample_rate: 48000  # Glue audio export sample rate (null to keep source rate)