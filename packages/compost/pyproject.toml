[project]
name = "fuit-es"
version = "0.1.0"
description = "Fuit.es Digital Compost - Interactive sound and image composition from digital discard"
readme = "README.md"
requires-python = ">=3.13,<3.14"
authors = [
    {name = "Mickaël Achkar", email = "mickael.achkar@gmail.com"}
]

dependencies = [
    "pygame>=2.6.1",
    "numpy>=2.0.0,<2.2",
    "matplotlib>=3.10.8",
    "scikit-image>=0.26.0",
    "scipy>=1.16.3",
    "flask>=3.1.2",
    "pymunk>=7.2.0",
    "pyyaml>=6.0.3",
    "librosa>=0.11.0",
    "numba>=0.61.0,<0.62",  # Pin to 0.61.x for llvmlite 0.44.0 (last version with x86_64 macOS wheels)
    "soundfile>=0.13.1",
    "pillow-heif>=1.1.1",
    "sounddevice>=0.5.3",
]

[project.optional-dependencies]
dev = [
    "ipykernel>=7.1.0",
    "scikit-learn>=1.5.2",
    "plotly>=6.5.2",
    "dash>=4.0.0",
    "demucs>=4.0.1",
]

# Unused packages (kept for reference):
# opencv-python>=4.10.0.84
# shapely>=2.0.6
# ipywidgets>=8.1.7
# nbformat>=5.10.4
# asteroid>=0.7.0

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = false  # This is an application, not a library
